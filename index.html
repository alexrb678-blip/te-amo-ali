<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sorpresa 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Fredoka', sans-serif;
  background: linear-gradient(to bottom, #ffc0d9, #ffd6e7);
  overflow-x: hidden;
}

/* BOTÓN INICIAL */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, #ffb3d9, #ffc0d9);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#startBtn {
  font-size: 45px;
  padding: 20px 50px;
  border-radius: 40px;
  border: none;
  background: #ff6fa5;
  color: white;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  cursor: pointer;
  transition: 0.3s;
}

#startBtn:hover {
  transform: scale(1.1);
}

/* CONTENIDO */
#content {
  display: none;
  text-align: center;
}

/* TEXTO BONITO */
h1 {
  margin-top: 120px;
  font-size: 65px;
  color: #ff9ecb;
  text-shadow:
    4px 4px 0 #ff6fa5,
    -2px -2px 0 #fff0f6;
  animation: aparecer 2s ease;
}

@keyframes aparecer {
  from {opacity:0; transform:scale(0.7);}
  to {opacity:1; transform:scale(1);}
}

/* PASTEL */
.cake {
  font-size: 100px;
  margin-top: 20px;
  animation: flotar 3s infinite ease-in-out;
}

@keyframes flotar {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* CONFETI */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: -10px;
  animation: caer linear infinite;
}

.confetti.s {
  width: 6px;
  height: 20px;
  border-radius: 50%;
  transform: rotate(45deg);
}

@keyframes caer {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}

/* CANVA */
.canva-container {
  margin-top: 100px;
  padding: 20px;
}

iframe {
  width: 90%;
  height: 600px;
  border: none;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- BOTÓN -->
<div id="startScreen">
  <button id="startBtn">Ábreme 💖</button>
</div>

<!-- CONTENIDO -->
<div id="content">
  <h1>Feliz cumpleaños mi Ali 💖</h1>
  <div class="cake">🎂✨</div>

  <!-- CANVA -->
  <div class="canva-container">
    <iframe src="https://www.canva.com/design/DAHEJVNg4LU/watch?embed"></iframe>
  </div>
</div>

<!-- MÚSICA -->
<audio id="music" loop>
  <source src="cancion.mp3" type="audio/mpeg">
</audio>

<script>
const btn = document.getElementById("startBtn");
const startScreen = document.getElementById("startScreen");
const content = document.getElementById("content");
const music = document.getElementById("music");

btn.onclick = () => {
  startScreen.style.display = "none";
  content.style.display = "block";
  music.play();
  startConfetti();
};

/* CONFETI BONITO */
const colors = ["#ff6fa5", "#ffb3d9", "#ffd166", "#a0e7e5", "#cdb4db", "#ffffff"];

function createConfetti() {
  const confetti = document.createElement("div");
  confetti.classList.add("confetti");

  if (Math.random() > 0.5) {
    confetti.classList.add("s");
  }

  confetti.style.left = Math.random() * window.innerWidth + "px";
  confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
  confetti.style.animationDuration = (3 + Math.random() * 5) + "s";

  document.body.appendChild(confetti);

  setTimeout(() => confetti.remove(), 8000);
}

function startConfetti() {
  setInterval(createConfetti, 120);
}
</script>

</body>
</html>
